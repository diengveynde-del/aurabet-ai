import React, { useState, useEffect } from 'react';
import { initializeApp } from 'firebase/app';
import { 
  getAuth, 
  signInAnonymously, 
  onAuthStateChanged, 
  signInWithCustomToken 
} from 'firebase/auth';
import { 
  getFirestore, 
  doc, 
  setDoc, 
  onSnapshot 
} from 'firebase/firestore';
import {
  Activity,
  BrainCircuit,
  CircleDollarSign,
  Coins,
  Landmark,
  ShieldCheck,
  Sparkles,
  Wallet,
  Zap,
  Check,
  X,
  LayoutGrid,
  User
} from 'lucide-react';

/**
 * STYLES GLOBAUX
 * Intégration de Tailwind CSS et des animations personnalisées "Vibranium"
 */
const GlobalStyles = () => (
  <style>{`
    @tailwind base;
    @tailwind components;
    @tailwind utilities;

    body {
      background: radial-gradient(circle at top, #170321 0%, #020202 55%, #010101 100%);
      color: #f5f5f5;
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .glass {
      background: linear-gradient(130deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
    }

    @keyframes pulse-purple {
      0% { border-color: rgba(126, 34, 206, 0.2); box-shadow: 0 0 0px rgba(126, 34, 206, 0); }
      50% { border-color: rgba(126, 34, 206, 0.8); box-shadow: 0 0 15px rgba(126, 34, 206, 0.3); }
      100% { border-color: rgba(126, 34, 206, 0.2); box-shadow: 0 0 0px rgba(126, 34, 206, 0); }
    }

    .animate-pulse-border {
      animation: pulse-purple 3s infinite;
    }

    /* Masquer les flèches des inputs numériques */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  `}</style>
);

// Initialisation de la configuration Firebase avec fallback sécurisé
const firebaseConfig = typeof __firebase_config !== 'undefined' 
  ? JSON.parse(__firebase_config) 
  : { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const appId = typeof __app_id !== 'undefined' ? __app_id : 'aurabet-ai-v1';

const App = () => {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState({ balance: 15000, auraScore: 700 });
  const [betSlip, setBetSlip] = useState({ active: false, team: '', odd: 1.85, amount: 1000 });
  const [toast, setToast] = useState(null);
  const [scriptLoaded, setScriptLoaded] = useState(false);

  // Chargement dynamique du Widget API-Sports
  useEffect(() => {
    const scriptId = 'api-sports-widget-script';
    if (!document.getElementById(scriptId)) {
      const script = document.createElement('script');
      script.id = scriptId;
      script.src = 'https://widgets.api-sports.io/football/1.1.8/widget.js';
      script.type = 'module';
      script.onload = () => setScriptLoaded(true);
      document.head.appendChild(script);
    } else {
      setScriptLoaded(true);
    }
  }, []);

  // Cycle de vie de l'authentification (Custom Token ou Anonyme)
  useEffect(() => {
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error("Erreur d'authentification AuraBet:", err);
      }
    };
    initAuth();
    const unsubscribe = onAuthStateChanged(auth, setUser);
    return () => unsubscribe();
  }, []);

  // Synchronisation temps réel avec Firestore (Profil utilisateur)
  useEffect(() => {
    if (!user) return;
    const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
    const unsubscribe = onSnapshot(profileRef, (snap) => {
      if (snap.exists()) {
        setProfile(snap.data());
      } else {
        // Initialisation du profil si inexistant
        setDoc(profileRef, { balance: 15000, auraScore: 700 });
      }
    }, (err) => console.error("Erreur de synchronisation Firestore:", err));
    return () => unsubscribe();
  }, [user]);

  // Validation du coupon de pari
  const confirmBet = async () => {
    if (!user) return;
    if (betSlip.amount > profile.balance) {
      setToast('Solde insuffisant !');
      setTimeout(() => setToast(null), 3000);
      return;
    }

    const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
    try {
      await setDoc(profileRef, { 
        ...profile, 
        balance: profile.balance - betSlip.amount 
      }, { merge: true });
      
      setBetSlip({ ...betSlip, active: false });
      setToast('Pari validé avec succès !');
      setTimeout(() => setToast(null), 3000);
    } catch (e) {
      console.error("Erreur lors de la validation du pari:", e);
      setToast('Erreur réseau. Réessayez.');
      setTimeout(() => setToast(null), 3000);
    }
  };

  // Écran de chargement initial
  if (!user) return (
    <div className="bg-black min-h-screen text-[#7e22ce] flex flex-col items-center justify-center gap-6">
      <div className="relative">
        <div className="w-16 h-16 border-4 border-[#7e22ce]/20 rounded-full"></div>
        <div className="w-16 h-16 border-4 border-[#7e22ce] border-t-transparent rounded-full animate-spin absolute top-0 left-0"></div>
      </div>
      <p className="font-black text-[10px] tracking-[0.5em] uppercase animate-pulse">Synchronisation Quantum</p>
    </div>
  );

  return (
    <div className="min-h-screen bg-[#020202] text-white pb-32">
      <GlobalStyles />
      
      {/* Toast System */}
      {toast && (
        <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-[#7e22ce] px-8 py-4 rounded-2xl z-[100] animate-bounce text-[11px] font-black uppercase tracking-widest shadow-2xl shadow-purple-500/40 border border-white/20">
          {toast}
        </div>
      )}

      {/* Header Statique */}
      <header className="p-6 border-b border-[#7e22ce]/20 flex justify-between items-center backdrop-blur-xl sticky top-0 z-50 bg-[#020202]/80">
        <div className="flex flex-col">
          <h1 className="text-2xl font-black italic uppercase leading-none tracking-tighter">
            AURA<span className="text-[#7e22ce]">BET</span>
          </h1>
          <span className="text-[7px] text-[#22d3ee] font-bold uppercase tracking-[0.3em] mt-1">AI Betting Supremacy</span>
        </div>
        <div className="bg-[#111] p-2 px-5 rounded-2xl border border-[#7e22ce]/40 text-right shadow-inner">
          <p className="text-[8px] uppercase text-[#7e22ce] font-black mb-0.5">Solde Actuel</p>
          <p className="font-black text-sm text-[#fbbf24]">{profile.balance.toLocaleString()} <span className="text-[10px] opacity-50">XOF</span></p>
        </div>
      </header>

      <main className="p-4 max-w-4xl mx-auto space-y-8 mt-4">
        {/* Module IA Advisor */}
        <section className="bg-gradient-to-br from-[#121212] to-black p-8 rounded-[2.5rem] border border-[#7e22ce]/20 animate-pulse-border relative overflow-hidden group">
          <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-30 transition-opacity">
            <BrainCircuit size={120} />
          </div>
          <div className="flex items-center gap-3 mb-6 text-[#fbbf24]">
            <BrainCircuit size={24} />
            <span className="text-[11px] uppercase font-black tracking-[0.2em]">Aura Advisor Premium</span>
          </div>
          <p className="text-xl font-bold italic mb-8 leading-tight">
            "Analyse prédictive terminée : <span className="text-[#22d3ee]">Hafia FC</span> présente un indice de confiance de <span className="text-[#7e22ce]">91%</span> pour une victoire à domicile."
          </p>
          <button 
            onClick={() => setBetSlip({ active: true, team: 'Hafia FC (IA Pick)', odd: 1.85, amount: 1000 })}
            className="w-full bg-[#7e22ce] hover:bg-[#9333ea] py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] active:scale-95 transition-all shadow-lg shadow-purple-900/20"
          >
            Suivre l'algorithme
          </button>
        </section>

        {/* Flux Live API-Sports */}
        <section className="space-y-4">
          <div className="flex justify-between items-center px-2">
             <h3 className="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 italic">Live <span className="text-[#7e22ce]">Quantum</span> Feed</h3>
             <span className="flex items-center gap-1.5">
               <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-ping"></span>
               <span className="text-[9px] text-red-500 font-black uppercase">Live</span>
             </span>
          </div>
          <div className="bg-white/5 rounded-[2.5rem] p-4 min-h-[500px] border border-white/5 shadow-2xl relative">
             <div 
               id="wg-api-football-livescore" 
               data-host="v3.football.api-sports.io" 
               data-key="e43f43300b5b692c2829ea3796642c3d" 
               data-type="livescore" 
               data-theme="dark" 
               className="api_sports_widget"
             ></div>
             {!scriptLoaded && (
               <div className="absolute inset-0 flex flex-col items-center justify-center text-white/10 gap-4">
                 <Zap size={48} className="animate-pulse" />
                 <p className="text-[10px] uppercase font-black tracking-widest animate-pulse">Initialisation des flux API...</p>
               </div>
             )}
          </div>
        </section>
      </main>

      {/* Navigation Basse Stylisée */}
      <nav className="fixed bottom-0 left-0 right-0 p-5 bg-[#020202]/90 border-t border-white/5 flex justify-around items-center backdrop-blur-2xl z-40">
        <button className="flex flex-col items-center gap-1 text-[#22d3ee]">
          <LayoutGrid size={22} />
          <span className="text-[7px] font-black uppercase italic">Dashboard</span>
        </button>
        <button className="flex flex-col items-center gap-1 text-white/20">
          <Zap size={22} />
          <span className="text-[7px] font-black uppercase italic">Live</span>
        </button>
        <div className="relative -mt-14">
          <button className="w-16 h-16 bg-gradient-to-tr from-[#7e22ce] to-[#22d3ee] rounded-full flex items-center justify-center border-[6px] border-[#020202] shadow-2xl transition-transform active:scale-90">
            <ShieldCheck size={30} className="text-white" />
          </button>
        </div>
        <button className="flex flex-col items-center gap-1 text-white/20">
          <Wallet size={22} />
          <span className="text-[7px] font-black uppercase italic">Wallet</span>
        </button>
        <button className="flex flex-col items-center gap-1 text-white/20">
          <User size={22} />
          <span className="text-[7px] font-black uppercase italic">Compte</span>
        </button>
      </nav>

      {/* Modal de Pari Quantum */}
      {betSlip.active && (
        <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[60] flex items-center justify-center p-6 animate-in fade-in duration-300">
          <div className="bg-[#0f0f0f] w-full max-w-md p-8 rounded-[3rem] border border-[#7e22ce]/30 shadow-2xl relative overflow-hidden">
            <div className="absolute -top-24 -left-24 w-48 h-48 bg-[#7e22ce]/10 blur-[60px] rounded-full"></div>
            
            <div className="flex justify-between items-center mb-10 relative">
              <div className="flex flex-col">
                <h4 className="font-black text-[#22d3ee] uppercase text-[10px] tracking-[0.3em] mb-1">Coupon de Pari</h4>
                <p className="text-white/40 text-[8px] uppercase font-bold tracking-widest">Validation de transaction</p>
              </div>
              <button 
                onClick={() => setBetSlip({ ...betSlip, active: false })}
                className="p-3 bg-white/5 hover:bg-white/10 rounded-full transition-colors text-white/40 hover:text-white"
              >
                <X size={20} />
              </button>
            </div>

            <div className="space-y-6 relative">
              <div className="bg-white/5 p-6 rounded-[2rem] border border-white/5">
                <p className="text-[8px] text-[#7e22ce] font-black uppercase tracking-widest mb-2">Sélection</p>
                <p className="text-xl font-black italic text-white uppercase">{betSlip.team}</p>
                <p className="text-xs font-bold text-[#fbbf24] mt-1">Cote : {betSlip.odd}</p>
              </div>

              <div className="flex gap-4">
                <div className="flex-1 relative">
                  <span className="absolute top-3 left-5 text-[8px] text-white/30 font-black uppercase tracking-widest">Mise (XOF)</span>
                  <input 
                    type="number" 
                    value={betSlip.amount} 
                    onChange={(e) => setBetSlip({...betSlip, amount: parseInt(e.target.value) || 0})}
                    className="w-full bg-black border border-white/10 p-6 rounded-3xl text-2xl font-black pt-9 outline-none focus:border-[#7e22ce]/50 transition-all text-white"
                  />
                </div>
                <div className="bg-[#7e22ce]/10 border border-[#7e22ce]/20 p-5 rounded-3xl text-center flex flex-col justify-center min-w-[120px]">
                  <p className="text-[8px] text-[#fbbf24] font-black uppercase tracking-widest mb-1">Gains Potentiels</p>
                  <p className="font-black text-lg text-white">{(betSlip.amount * betSlip.odd).toFixed(0)} <span className="text-[10px] opacity-50">F</span></p>
                </div>
              </div>

              <button 
                onClick={confirmBet} 
                className="w-full bg-[#7e22ce] hover:bg-[#9333ea] py-6 rounded-[2rem] font-black uppercase text-xs tracking-[0.3em] transition-all active:scale-95 shadow-xl shadow-purple-900/40 border border-white/10"
              >
                Confirmer l'opération
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

export default App;