version: '3.8'

services:
  app:
    image: node:14
    command: npm run dev
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development

  playwright:
    image: mcr.microsoft.com/playwright:v1.34.1
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: ['npx', 'playwright', 'test']
